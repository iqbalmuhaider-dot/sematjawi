        // ==========================================
        // KAWALAN TINDAKAN (CONTROLLERS)
        // ==========================================
        window.handleAction = function(action, payload) {
            switch(action) {
                case 'google-login':
                    const provider = new GoogleAuthProvider();
                    signInWithPopup(auth, provider).catch(error => {
                        console.error("Gagal log masuk Google:", error);
                        state.modal = { isOpen: true, type: 'alert', title: 'Ralat', message: 'Log masuk dibatalkan atau gagal.' };
                        render();
                    });
                    break;
                case 'logout':
                    signOut(auth).then(() => {
                        state.currentUser = null;
                        state.activeTab = 'utama';
                        state.isMobileMenuOpen = false;
                        state.quizSession.active = false;
                        state.selectedQuizCategory = null;
                        state.editingItem = null;
                        state.editingQuiz = null;
                        render();
                    });
                    break;
                case 'switch-tab':
                    state.activeTab = payload;
                    state.isMobileMenuOpen = false; // close mobile menu on click
                    state.editingItem = null;
                    state.editingQuiz = null;
                    if(payload === 'kuiz') state.selectedQuizCategory = null; // Kembali ke menu kategori bila klik tab kuiz
                    render();
                    break;
                case 'select-quiz-category':
                    state.selectedQuizCategory = payload;
                    render();
                    break;
                case 'back-to-categories':
                    state.selectedQuizCategory = null;
                    render();
                    break;
                case 'toggle-menu':
                    state.isMobileMenuOpen = !state.isMobileMenuOpen;
                    render();
                    break;
                
                // --- PENGURUSAN EDIT/KANDUNGAN (GURU) ---
                case 'view-note-details': {
                    const note = state.notes.find(n => n.id === payload);
                    if(note){
                        let cHtml = note.type === 'html' ? note.content : (note.type === 'text' ? `<p class="font-jawi text-right text-lg">${note.content}</p>` : `<pre class="text-sm bg-gray-100 p-4 rounded">${note.content}</pre>`);
                        state.modal = { isOpen: true, type: 'view-details', title: `Nota: ${note.title}`, content: cHtml };
                        render();
                    }
                    break;
                }
                case 'view-exam-details': {
                    const exm = state.exams.find(e => e.id === payload);
                    if(exm){
                        state.modal = { isOpen: true, type: 'view-details', title: `Ujian: ${exm.title}`, content: `<div class="w-full overflow-hidden rounded-lg">${exm.content}</div>` };
                        render();
                    }
                    break;
                }
                case 'view-quiz-details': {
                    const qz = state.quizzes.find(q => q.id === payload);
                    if(qz){
                        let content = '';
                        if(qz.type === 'embed') {
                            content = `<div class="w-full overflow-hidden rounded-lg">${qz.content}</div>`;
                        } else {
                            content = qz.questions.map((qs, i) => `
                                <div class="mb-4 p-4 border border-gray-200 rounded-lg bg-gray-50">
                                    <p class="font-bold text-gray-800 mb-2">${i+1}. ${qs.q}</p>
                                    <ul class="text-sm space-y-1 mb-2 font-jawi text-gray-600">
                                        ${qs.options.map(opt => `<li>- ${opt}</li>`).join('')}
                                    </ul>
                                    <p class="text-xs font-bold text-emerald-600 bg-emerald-100 px-2 py-1 rounded inline-block">Jawapan: ${qs.answer}</p>
                                </div>
                            `).join('');
                        }
                        state.modal = { isOpen: true, type: 'view-details', title: `Kuiz: ${qz.title}`, content: content };
                        render();
                    }
                    break;
                }
                case 'edit-note':
                    state.editingItem = { model: 'note', data: state.notes.find(n => n.id === payload) };
                    window.scrollTo(0,0);
                    render();
                    break;
                case 'edit-exam':
                    state.editingItem = { model: 'exam', data: state.exams.find(e => e.id === payload) };
                    window.scrollTo(0,0);
                    render();
                    break;
                case 'cancel-edit':
                    state.editingItem = null;
                    render();
                    break;
                
                // --- QUIZ BUILDER ---
                case 'create-new-quiz':
                    state.editingQuiz = { id: Date.now(), title: '', type: 'custom', questions: [] };
                    render();
                    break;
                case 'edit-quiz':
                    state.editingQuiz = JSON.parse(JSON.stringify(state.quizzes.find(q => q.id === payload)));
                    render();
                    break;
                case 'cancel-quiz-edit':
                    state.editingQuiz = null;
                    render();
                    break;
                case 'update-quiz-title':
                    if(state.editingQuiz) state.editingQuiz.title = payload;
                    break;
                case 'add-question':
                    state.editingQuiz.questions.push({ q: '', options: ['', '', '', ''], answer: '' });
                    render();
                    break;
                case 'remove-question':
                    state.editingQuiz.questions.splice(payload, 1);
                    render();
                    break;
                case 'update-question':
                    // payload: {qIndex, field, optIndex, value}
                    let question = state.editingQuiz.questions[payload.qIndex];
                    if(payload.field === 'q') question.q = payload.value;
                    else if(payload.field === 'answer') question.answer = payload.value;
                    else if(payload.field === 'opt') question.options[payload.optIndex] = payload.value;
                    render();
                    break;
                case 'save-quiz':
                    if(!state.editingQuiz.title) return alert("Sila masukkan tajuk kuiz.");
                    if(state.editingQuiz.questions.length === 0) return alert("Sila letak sekurang-kurangnya 1 soalan.");
                    
                    let existQIndex = state.quizzes.findIndex(q => q.id === state.editingQuiz.id);
                    if(existQIndex >= 0) state.quizzes[existQIndex] = state.editingQuiz;
                    else state.quizzes.push(state.editingQuiz);
                    
                    state.editingQuiz = null;
                    saveState();
                    state.modal = { isOpen: true, type: 'alert', title: 'Berjaya', message: 'Modul kuiz telah dikemas kini dan disimpan.' };
                    render();
                    break;

                // --- FUNGSI SEDIA ADA ---
                case 'start-quiz':
                    state.quizSession = { active: true, quizId: payload, currentIndex: 0, score: 0 };
                    render();
                    break;
                case 'cancel-quiz':
                    state.quizSession.active = false;
                    render();
                    break;
                case 'answer-quiz': {
                    const quiz = state.quizzes.find(q => q.id === state.quizSession.quizId);
                    const question = quiz.questions[state.quizSession.currentIndex];
                    const selectedOpt = question.options[payload];
                    
                    if (selectedOpt === question.answer) {
                        state.quizSession.score++;
                        alert("Jawapan Tepat! Anda mendapat 1 Bintang.");
                    } else {
                        alert("Opps, jawapan kurang tepat.\nJawapan betul: " + question.answer);
                    }
                    
                    state.quizSession.currentIndex++;
                    
                    // Semak jika kuiz tamat
                    if (state.quizSession.currentIndex >= quiz.questions.length) {
                        const total = quiz.questions.length;
                        const score = state.quizSession.score;
                        
                        // Update progres & bintang murid
                        state.currentUser.stars += score;
                        state.currentUser.progress += Math.round((score / total) * 10);
                        if (state.currentUser.progress > 100) state.currentUser.progress = 100;
                        
                        // Rekod log
                        if (!state.currentUser.records) state.currentUser.records = [];
                        state.currentUser.records.push({
                            assessmentTitle: quiz.title,
                            score: score,
                            total: total,
                            date: new Date().toLocaleDateString('ms-MY') + ' ' + new Date().toLocaleTimeString('ms-MY')
                        });
                        
                        // Simpan dalam sistem
                        const me = state.users.find(u => u.id === state.currentUser.id);
                        if (me) {
                            me.stars = state.currentUser.stars;
                            me.progress = state.currentUser.progress;
                            me.records = state.currentUser.records;
                        }
                        saveState();
                        
                        state.quizSession.active = false; // Matikan sesi
                        state.modal = { isOpen: true, type: 'alert', title: 'Tahniah, Kuiz Selesai!', message: `Anda mendapat markah ${score}/${total} dan ${score} bintang telah dimasukkan!` };
                        state.activeTab = 'prestasi';
                    }
                    render();
                    break;
                }
                case 'give-star':
                    const student = state.users.find(u => u.id === payload);
                    if(student) {
                        student.stars += 1;
                        saveState();
                        state.modal = { isOpen: true, type: 'alert', title: 'Berjaya!', message: `1 Bintang telah diberikan kepada ${student.name}!` };
                        render();
                    }
                    break;
                case 'delete-user':
                    state.modal = { isOpen: true, type: 'confirm-delete-user', payload: payload, title: 'Padam Pengguna', message: 'Adakah anda pasti mahu memadam pengguna ini?' };
                    render();
                    break;
                case 'delete-note':
                    state.modal = { isOpen: true, type: 'confirm-delete-note', payload: payload, title: 'Padam Nota', message: 'Adakah anda pasti mahu memadam nota ini?' };
                    render();
                    break;
                case 'delete-exam':
                    state.modal = { isOpen: true, type: 'confirm-delete-exam', payload: payload, title: 'Padam Ujian', message: 'Adakah anda pasti mahu memadam ujian ini?' };
                    render();
                    break;
                case 'delete-quiz':
                    state.modal = { isOpen: true, type: 'confirm-delete-quiz', payload: payload, title: 'Padam Kuiz', message: 'Adakah anda pasti mahu memadam kuiz ini secara kekal?' };
                    render();
                    break;
                case 'close-modal':
                    state.modal.isOpen = false;
                    render();
                    break;
                case 'execute-delete':
                    if (state.modal.type === 'confirm-delete-user') {
                        state.users = state.users.filter(u => u.id !== state.modal.payload);
                    } else if (state.modal.type === 'confirm-delete-note') {
                        state.notes = state.notes.filter(n => n.id !== state.modal.payload);
                    } else if (state.modal.type === 'confirm-delete-exam') {
                        state.exams = state.exams.filter(e => e.id !== state.modal.payload);
                    } else if (state.modal.type === 'confirm-delete-quiz') {
                        state.quizzes = state.quizzes.filter(q => q.id !== state.modal.payload);
                    }
                    saveState();
                    state.modal.isOpen = false;
                    state.modal = { isOpen: true, type: 'alert', title: 'Berjaya', message: 'Rekod telah berjaya dipadam.' };
                    render();
                    break;
                case 'open-progress-modal':
                    state.modal = { isOpen: true, type: 'update-progress', payload: payload };
                    render();
                    break;
                case 'view-records':
                    state.modal = { isOpen: true, type: 'view-records', payload: payload };
                    render();
                    break;
                case 'execute-update-progress':
                    const newProg = document.getElementById('new-progress-val').value;
                    const stu = state.users.find(u => u.id === state.modal.payload);
                    if(stu) {
                        stu.progress = Math.min(100, Math.max(0, parseInt(newProg) || 0));
                    }
                    saveState();
                    state.modal.isOpen = false;
                    state.modal = { isOpen: true, type: 'alert', title: 'Berjaya', message: 'Prestasi murid telah berjaya dikemaskini.' };
                    render();
                    break;
                case 'mock-upload':
                    state.modal = { isOpen: true, type: 'alert', title: 'Makluman', message: payload };
                    render();
                    break;
            }
        };

        window.handleFormSubmit = function(e, formType) {
            e.preventDefault();
            const formData = new FormData(e.target);
            
            if (formType === 'add-user') {
                const newUser = {
                    id: Date.now(),
                    role: formData.get('role'),
                    name: formData.get('name'),
                    email: formData.get('email').toLowerCase(),
                    stars: formData.get('role') === 'student' ? 0 : undefined,
                    progress: formData.get('role') === 'student' ? 0 : undefined,
                    records: formData.get('role') === 'student' ? [] : undefined
                };
                state.users.push(newUser);
                state.modal = { isOpen: true, type: 'alert', title: 'Berjaya', message: 'Pengguna baru berjaya ditambah.' };
            } 
            else if (formType === 'add-note') {
                let content = formData.get('content');
                const type = formData.get('type');
                const id = formData.get('id') ? parseInt(formData.get('id')) : Date.now();
                
                if (type === 'youtube' && content.includes('watch?v=')) {
                    content = content.replace('watch?v=', 'embed/');
                }

                const newNote = { id, title: formData.get('title'), type, content };
                const existIdx = state.notes.findIndex(n => n.id === id);
                if(existIdx >= 0) state.notes[existIdx] = newNote;
                else state.notes.push(newNote);
                
                state.editingItem = null;
                state.modal = { isOpen: true, type: 'alert', title: 'Berjaya', message: 'Nota telah disimpan.' };
            }
            else if (formType === 'add-exam') {
                const id = formData.get('id') ? parseInt(formData.get('id')) : Date.now();
                const newExam = { id, title: formData.get('title'), type: 'embed', content: formData.get('content') };
                
                const existIdx = state.exams.findIndex(e => e.id === id);
                if(existIdx >= 0) state.exams[existIdx] = newExam;
                else state.exams.push(newExam);
                
                state.editingItem = null;
                state.modal = { isOpen: true, type: 'alert', title: 'Berjaya', message: 'Ujian telah disimpan.' };
            }

            e.target.reset();
            saveState();
            render();
        };

        // --- SISTEM CLOUD FIRESTORE ---
        async function saveState() {
            if (!auth.currentUser) return;
            try {
                // Semua perubahan kini ditulis semula ke DB sepenuhnya
                await setDoc(docRef, {
                    users: state.users,
                    notes: state.notes,
                    quizzes: state.quizzes,
                    exams: state.exams,
                    seedVersion: SEED_VERSION // Rekod versi supaya sistem tau ia update terbaru
                });
            } catch (error) {
                console.error("Gagal simpan ke Firestore:", error);
            }
        }

        let unsubscribeSnapshot = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Pengguna telah log masuk Google, dengar data Firestore
                unsubscribeSnapshot = onSnapshot(docRef, async (docSnap) => {
                    let parsed = docSnap.exists() ? docSnap.data() : null;

                    // Semak jika Pangkalan Data Kosong ATAU Versi Terlalu Lama (Perlu Force Update Modul KPM)
                    if (!parsed || parsed.seedVersion !== SEED_VERSION) {
                        console.log("Memuatnaik modul sistem KPM terkini...");
                        // Kekalkan nota/kuiz tambahan guru (ID > 10000)
                        let customNotes = parsed && parsed.notes ? parsed.notes.filter(n => n.id > 10000) : [];
                        let customQuizzes = parsed && parsed.quizzes ? parsed.quizzes.filter(q => q.id > 10000) : [];
                        
                        state.notes = [...SYSTEM_NOTES, ...customNotes];
                        state.quizzes = [...SYSTEM_QUIZZES, ...customQuizzes];
                        state.exams = parsed && parsed.exams ? parsed.exams : state.exams;
                        state.users = parsed && parsed.users ? parsed.users : [];
                        
                        // Selepas log masuk pertama sebagai admin, fungsi saveState() di bawah akan memateri data ini dalam DB.
                    } else {
                        // Data DB adalah versi selari. Guna data DB sepenuhnya.
                        state.notes = parsed.notes || [];
                        state.quizzes = parsed.quizzes || [];
                        state.exams = parsed.exams || [];
                        state.users = parsed.users || [];
                    }

                    // Penyeragaman E-mel kepada huruf kecil untuk mengelakkan ralat "Case-Sensitive"
                    const userEmail = user.email ? user.email.toLowerCase() : '';
                    
                    // Semak jika pengguna berdaftar wujud dalam Whitelist Admin
                    let sjUser = state.users.find(u => u.email && u.email.toLowerCase() === userEmail);

                    if (!sjUser) {
                        // Logik Pertama: Log masuk pertama automatik jadi ADMIN.
                        const hasTeacher = state.users.some(u => u.role === 'teacher' && u.email);
                        if (!hasTeacher) {
                            // Pendaftaran automatik Guru Pertama (Admin)
                            sjUser = {
                                id: Date.now(),
                                role: 'teacher',
                                name: user.displayName || 'Guru Admin',
                                email: userEmail
                            };
                            state.users.push(sjUser);
                            await saveState(); // Menyimpan guru ini dan modul KPM ke Firestore
                            
                            // Tetapkan sesi semasa dan papar
                            state.currentUser = sjUser;
                            render();
                            return; 
                        } else {
                            // Jika sudah ada Admin, tetapi E-mel pengguna baru tiada dalam senarai Whitelist
                            state.currentUser = null;
                            state.modal = { 
                                isOpen: true, 
                                type: 'alert', 
                                title: 'Akses Ditolak (Tiada Whitelist)', 
                                message: `E-mel anda (${userEmail}) tidak dibenarkan mengakses sistem. Sila hubungi Guru/Admin untuk mendaftarkan e-mel anda ke dalam Senarai Putih (Whitelist) terlebih dahulu.` 
                            };
                            render();
                            signOut(auth);
                            return;
                        }
                    }

                    // Jika pengguna sudah wujud dalam Whitelist, Log masuk berjaya
                    state.currentUser = sjUser;
                    
                    // Update current user name if Google name changed
                    if(user.displayName && sjUser.name !== user.displayName){
                         sjUser.name = user.displayName;
                         saveState();
                    }

                    render();
                }, (error) => {
                    console.error("Ralat mengambil data Firestore:", error);
                });
            } else {
                // Pengguna Log Keluar
                if (unsubscribeSnapshot) unsubscribeSnapshot();
                state.currentUser = null;
                render();
            }
        });

        // --- SISTEM KOMUNIKASI IFRAME (UNTUK CUSTOM HTML EMBED) ---
        window.addEventListener('message', function(event) {
            // Kita semak jika mesej datang dengan format yang betul
            if (event.data && event.data.type === 'SEMAT_JAWI_SCORE') {
                if (state.currentUser && state.currentUser.role === 'student') {
                    const earnedStars = event.data.stars || 0;
                    const earnedProgress = event.data.progress || 0;
                    const score = event.data.score || 0;
                    const total = event.data.total || 0;
                    const assessmentTitle = event.data.assessmentTitle || 'Kuiz / Ujian HTML';

                    // Kemas kini data murid semasa
                    state.currentUser.stars += earnedStars;
                    state.currentUser.progress += earnedProgress;
                    if (state.currentUser.progress > 100) state.currentUser.progress = 100;

                    // Daftar log markah ke dalam rekod
                    if (!state.currentUser.records) state.currentUser.records = [];
                    state.currentUser.records.push({
                        assessmentTitle: assessmentTitle,
                        score: score,
                        total: total,
                        date: new Date().toLocaleDateString('ms-MY') + ' ' + new Date().toLocaleTimeString('ms-MY')
                    });

                    // Kemas kini dalam pangkalan data utama
                    const me = state.users.find(u => u.id === state.currentUser.id);
                    if (me) {
                        me.stars = state.currentUser.stars;
                        me.progress = state.currentUser.progress;
                        me.records = state.currentUser.records;
                    }

                    saveState();

                    // Tunjuk Pop-up Berjaya
                    state.modal = { 
                        isOpen: true, 
                        type: 'alert', 
                        title: 'Ujian Selesai!', 
                        message: `Anda mendapat markah ${score}/${total}. (${earnedStars} Bintang ganjaran ditambah)` 
                    };
                    
                    state.activeTab = 'prestasi';
                    render();
                }
            }
        });

        // --- MULAKAN APLIKASI ---
        render(); // Papar paparan awal (Skrin Log Masuk) sementara menunggu status auth Firebase

    </script>
</body>
</html>
